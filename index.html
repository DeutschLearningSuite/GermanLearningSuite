<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Learning Suite</title>

  <script type="module" src="/src/main.ts"></script>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo-area">
        <h2>German Learning Suite</h2>
      </div>

      <nav>
        <button class="nav-btn active">Dashboard</button>
        <button class="nav-btn">Vocabulary</button>
        <button class="nav-btn">Flashcards</button>
        <button class="nav-btn">Hören Lab</button>
        <button class="nav-btn">Reading Lab</button>
        <button class="nav-btn">Statistics</button>
        <button class="nav-btn">Settings</button>
      </nav>
    </aside>

    <main class="content">

  <h1>Vocabulary Manager</h1>

  <div class="card">

    <h3>Add New Vocabulary</h3>

    <br>

    <input id="germanWord" placeholder="German Word">

    <br><br>

    <input id="article" placeholder="Article (der/die/das)">

    <br><br>

    <input id="englishMeaning" placeholder="English Meaning">

    <br><br>

    <button id="saveWord">
      Save Vocabulary
    </button>

  </div>

  <br>

  <div class="card">

    <h3>Saved Vocabulary</h3>

    <ul id="vocabularyList"></ul>

  </div>

</main>

  </div>
</body>
</html>
